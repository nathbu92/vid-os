name: 🎬 YouTube → Discord Notifier

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-videos:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Dépendances
        run: npm install
        working-directory: bot

      - name: 🔍 Vérification nouvelles vidéos
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          CHANNELS: ${{ secrets.CHANNELS }}
          MENTION: ${{ secrets.MENTION }}
          # En déclenchement manuel → mode init : on indexe sans notifier
          INIT_MODE: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: node bot/index.js

      - name: 💾 Commit seen_videos.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bot/seen_videos.json
          git diff --cached --quiet || git commit -m "chore: update seen_videos [skip ci]"
          git push
